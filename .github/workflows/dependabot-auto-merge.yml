name: Dependabot auto-merge

# Auto-merges Dependabot PRs (github-actions, pip, npm — see .github/dependabot.yml)
# once CI is green, for patch/minor bumps only. Major bumps are left for manual
# review since they can carry breaking changes.
#
# Requires the repo setting Settings → General → Pull Requests → "Allow auto-merge"
# to be enabled (one-time, repo-admin action; not settable via this workflow).
# gh pr merge --auto queues the merge — GitHub performs it once all required status
# checks pass, so this doesn't bypass CI.

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge (patch/minor only)
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
