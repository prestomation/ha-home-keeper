name: Docs site — PR preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    paths:
      - 'website/**'
      - 'docs/images/**'
      - '.github/workflows/docs-preview.yml'

# Previews deploy to pr-preview/pr-<n>/ on the gh-pages branch and a sticky
# comment with the URL is posted on the PR.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    # Forked PRs cannot get a preview (no write token); skip them gracefully.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: github.event.action != 'closed'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install
        if: github.event.action != 'closed'
        working-directory: website
        run: npm ci

      - name: Build
        if: github.event.action != 'closed'
        working-directory: website
        env:
          DOCS_BASE_URL: /ha-home-keeper/pr-preview/pr-${{ github.event.number }}/
        run: npm run build

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: website/build
          preview-branch: gh-pages
          umbrella-dir: pr-preview
