services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    ports:
      - "8123:8123"
    volumes:
      - ./ha_config:/config
      # Mount the integration under test and the test-only stub companions as
      # siblings inside the (writable) /config tree, rather than mounting the whole
      # read-only custom_components over the parent — that blocks Docker from
      # creating the nested mountpoints. The stubs give Settings → Companions real
      # connected companions: Pawsistant (push self-registration) and the Battery
      # Notes glue (catalog detection). The stubs are not part of the shipped
      # component; the created /config/custom_components dir is gitignored.
      - ../../custom_components/home_keeper:/config/custom_components/home_keeper:ro
      - ./stubs/pawsistant:/config/custom_components/pawsistant:ro
      - ./stubs/home_keeper_battery_notes:/config/custom_components/home_keeper_battery_notes:ro
    environment:
      - TZ=America/New_York
    tmpfs:
      - /tmp
