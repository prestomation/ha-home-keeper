homeassistant:
  name: Test Home
  unit_system: imperial
  time_zone: America/New_York
  latitude: 40.7128
  longitude: -74.0060
  elevation: 10

# Enable the REST API
api:

# Enable frontend (required for the custom sidebar panel + Lovelace resources)
frontend:

# Enable the recorder. A real HA install always has it (via default_config); this
# minimal test config omits default_config, so without this the HA frontend's
# `recorder/info` probe at load is rejected as an unknown command and surfaces as an
# unhandled websocket rejection in the browser console. Enabling it keeps the e2e
# environment representative and the console clean.
recorder:

# A `device_class: problem` binary sensor, kept "on", so the problem-sensor sync
# (enabled via the home_keeper config entry's options) has something to mirror — it
# drives the seeded `task_sump_problem` synced task used by the screenshot capture
# and integration coverage. A unique_id registers it in the entity registry so the
# sync's enumeration can find it.
template:
  - binary_sensor:
      - name: "Sump pump problem"
        unique_id: sump_pump_problem
        device_class: problem
        state: "{{ true }}"

# Dedicated YAML dashboard used by the Playwright e2e suite. The default
# (storage-mode) dashboard from onboarding is left untouched. The Home Keeper
# todo/calendar entities resolve via HA's built-in cards.
lovelace:
  mode: storage
  dashboards:
    home-keeper-e2e:
      mode: yaml
      title: Home Keeper E2E
      icon: mdi:home-clock
      show_in_sidebar: true
      filename: home-keeper-e2e.yaml

# Helpers + automation used by test_lifecycle to observe the
# home_keeper_task_completed event (the public cross-integration hook). The
# automation records the event's opaque source/origin so a REST test can assert the
# event fired with the right payload.
input_text:
  hk_last_completed_source:
    name: HK last completed source
    max: 255
  hk_last_completed_origin:
    name: HK last completed origin
    max: 255
  hk_last_low_stock_part:
    name: HK last low-stock part
    max: 255

automation:
  - alias: Capture Home Keeper task completed
    trigger:
      - platform: event
        event_type: home_keeper_task_completed
    action:
      - service: input_text.set_value
        target:
          entity_id: input_text.hk_last_completed_source
        data:
          value: "{{ trigger.event.data.source | tojson }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.hk_last_completed_origin
        data:
          value: "{{ trigger.event.data.origin if trigger.event.data.origin is not none else 'none' }}"
  - alias: Capture Home Keeper part low stock
    trigger:
      - platform: event
        event_type: home_keeper_part_low_stock
    action:
      - service: input_text.set_value
        target:
          entity_id: input_text.hk_last_low_stock_part
        data:
          value: "{{ trigger.event.data.part_id }}@{{ trigger.event.data.stock }}"

# Minimal logging
logger:
  default: info
  logs:
    custom_components.home_keeper: debug
