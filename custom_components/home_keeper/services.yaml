add_task:
  name: Add task
  description: >-
    Create a new maintenance task or chore. Returns the created task's id as
    {"task_id": ...} when called with return_response.
  fields:
    name:
      name: Name
      description: Display name of the task.
      required: true
      example: Replace furnace filter
      selector:
        text:
    notes:
      name: Notes
      description: Optional free-text notes.
      selector:
        text:
          multiline: true
    recurrence_type:
      name: Recurrence type
      description: >-
        floating (measured from completion), fixed (anchored schedule), one-off
        (do-once — uses "due", goes dormant when completed), triggered
        (condition-driven — no schedule; an owning integration arms it via trigger_task
        and clears it via complete_task), or sensor (due-state derived from a bound
        numeric sensor — uses "sensor"). interval/unit/freq/anchor are N/A for one-off,
        triggered, and sensor.
      selector:
        select:
          options:
            - floating
            - fixed
            - one-off
            - triggered
            - sensor
    interval:
      name: Interval
      description: Repeat every N units/steps (floating/fixed only; N/A for triggered).
      example: 1
      selector:
        number:
          min: 1
          mode: box
    unit:
      name: Unit
      description: For floating tasks - days, weeks, or months.
      selector:
        select:
          options:
            - days
            - weeks
            - months
    freq:
      name: Frequency
      description: For fixed tasks - DAILY, WEEKLY, or MONTHLY.
      selector:
        select:
          options:
            - DAILY
            - WEEKLY
            - MONTHLY
    anchor:
      name: Anchor
      description: For fixed tasks - ISO datetime of the first occurrence (sets time-of-day).
      example: "2026-01-01T08:00:00"
      selector:
        text:
    due:
      name: Due date
      description: >-
        For one-off tasks - ISO datetime the task is due. Optional; defaults to now
        (due today) when omitted.
      example: "2026-07-01T08:00:00"
      selector:
        text:
    sensor:
      name: Sensor trigger
      description: >-
        For sensor tasks - a mapping describing the bound numeric sensor. Always
        entity_id and mode ("usage" or "threshold"). For usage (a meter): target
        (arm once the reading advances this many units since the last completion).
        For threshold: comparison (">=", "<=", ">", "<", "==", "!="), value, and an
        optional for_seconds hold. Optional attribute reads an entity attribute
        instead of the state. Example - {"entity_id": "sensor.odometer", "mode":
        "usage", "target": 15000}.
      example: '{"entity_id": "sensor.odometer", "mode": "usage", "target": 15000}'
      selector:
        object:
    last_completed:
      name: Last completed
      description: >-
        Optional "last done" date. Seeds an initial completion so a floating task
        starts measured from this date (next due = last done + interval) instead of
        being due immediately. Omit for a task that has never been done.
      example: "2026-01-01T08:00:00"
      selector:
        datetime:
    device_id:
      name: Device
      description: Optional device to attach this task to.
      selector:
        device:
    area_id:
      name: Area
      description: Optional area to associate with this task.
      selector:
        area:
    labels:
      name: Labels
      description: >-
        Optional Home Assistant labels to tag this task with (e.g. "dog", "car",
        a kid's name). Used by the dashboard card's label filter, which also
        matches a task via the labels on its attached device or area.
      selector:
        label:
          multiple: true
    card_links:
      name: Card links
      description: >-
        Appliance links to surface on this task's dashboard-card row. A list of
        {asset_id, entry_id} objects, each pointing at one of the appliance's
        document links or metadata links. The card resolves them to a live name/URL
        and drops any that no longer exist. Usually set from the panel's task editor.
      advanced: true
      selector:
        object:
    task_chips:
      name: Task chips
      description: >-
        Integration-provided metadata chips shown in both the panel task list and the
        dashboard card. A list of {label, icon?, url?} objects. label is required;
        icon must be an mdi: icon name if present; url must be an http(s) URL if
        present (the chip becomes a link). Intended for integrations to surface
        contextual metadata (e.g. battery type) alongside the task. Not
        user-editable in the panel.
      advanced: true
      selector:
        object:
    source:
      name: Source
      description: >-
        Opaque provenance owned by the integration that created the task, namespaced
        under that integration's domain. Home Keeper stores and echoes it verbatim and
        never inspects it. See docs/INTEGRATING.md.
      selector:
        object:
    completion_detail:
      name: Completion detail
      description: >-
        How much context to capture when this task is completed: "none" (mark done
        with no prompt), "optional" (offer the note/cost/photo/who fields), or
        "required" (require the fields listed in completion_required_fields before the
        task can be marked done). Panel-only capture prompt; defaults to "optional".
      advanced: true
      selector:
        select:
          options:
            - none
            - optional
            - required
    completion_required_fields:
      name: Required completion fields
      description: >-
        Which completion-metadata fields the panel makes mandatory when
        completion_detail is "required" — any of note, cost, photo, who.
      advanced: true
      selector:
        select:
          multiple: true
          options:
            - note
            - cost
            - photo
            - who

update_task:
  name: Update task
  description: Update fields of an existing task.
  fields:
    task_id:
      name: Task ID
      description: The id of the task to update.
      required: true
      selector:
        text:
    name:
      name: Name
      description: New display name.
      selector:
        text:
    notes:
      name: Notes
      description: New notes.
      selector:
        text:
          multiline: true
    recurrence_type:
      name: Recurrence type
      description: >-
        floating, fixed, one-off (do-once), triggered (condition-driven, no schedule),
        or sensor (derived from a bound numeric sensor).
      selector:
        select:
          options:
            - floating
            - fixed
            - one-off
            - triggered
            - sensor
    interval:
      name: Interval
      description: Repeat every N units/steps.
      selector:
        number:
          min: 1
          mode: box
    unit:
      name: Unit
      description: days, weeks, or months (floating).
      selector:
        select:
          options:
            - days
            - weeks
            - months
    freq:
      name: Frequency
      description: DAILY, WEEKLY, or MONTHLY (fixed).
      selector:
        select:
          options:
            - DAILY
            - WEEKLY
            - MONTHLY
    anchor:
      name: Anchor
      description: ISO datetime of the first occurrence (fixed).
      selector:
        text:
    due:
      name: Due date
      description: ISO datetime the task is due (one-off).
      selector:
        text:
    sensor:
      name: Sensor trigger
      description: >-
        Sensor binding for a sensor task (see add_task): entity_id, mode
        (usage/threshold) and the mode's fields. Replaces the whole binding.
      selector:
        object:
    device_id:
      name: Device
      description: Device to attach this task to.
      selector:
        device:
    area_id:
      name: Area
      description: Area to associate with this task.
      selector:
        area:
    labels:
      name: Labels
      description: >-
        Home Assistant labels to tag this task with (replaces the current set).
        Used by the dashboard card's label filter.
      selector:
        label:
          multiple: true
    card_links:
      name: Card links
      description: >-
        Appliance links to surface on this task's dashboard-card row (replaces the
        current set). A list of {asset_id, entry_id} objects pointing at the
        appliance's document/metadata links. Usually set from the panel's task editor.
      advanced: true
      selector:
        object:
    task_chips:
      name: Task chips
      description: >-
        Integration-provided metadata chips (replaces the current set). A list of
        {label, icon?, url?} objects. See add_task for full schema.
      advanced: true
      selector:
        object:
    source:
      name: Source
      description: >-
        Opaque provenance owned by the integration that created the task. See
        docs/INTEGRATING.md.
      selector:
        object:
    completion_detail:
      name: Completion detail
      description: >-
        How much context to capture on completion: "none", "optional", or "required"
        (see add_task). Panel-only capture prompt.
      advanced: true
      selector:
        select:
          options:
            - none
            - optional
            - required
    completion_required_fields:
      name: Required completion fields
      description: >-
        Which completion-metadata fields the panel makes mandatory when
        completion_detail is "required" — any of note, cost, photo, who.
      advanced: true
      selector:
        select:
          multiple: true
          options:
            - note
            - cost
            - photo
            - who

delete_task:
  name: Delete task
  description: Delete a task.
  fields:
    task_id:
      name: Task ID
      required: true
      selector:
        text:
    force:
      name: Force
      description: >-
        Bypass deletion protection for a task managed by another integration. Use
        this to clean up a task whose managing integration was uninstalled or is
        misbehaving and can't remove it itself.
      default: false
      selector:
        boolean:

complete_task:
  name: Complete task
  description: Mark a task complete and advance its recurrence.
  fields:
    task_id:
      name: Task ID
      required: true
      selector:
        text:
    completed_at:
      name: Completed at
      description: Optional completion timestamp (defaults to now).
      selector:
        datetime:
    origin:
      name: Origin
      description: >-
        Optional free-form marker echoed back in the home_keeper_task_completed event,
        so a contributing integration can recognise and ignore the completion it
        triggered (loop prevention). Home Keeper does not interpret it.
      selector:
        text:
    note:
      name: Note
      description: Optional free-form note recorded with this completion.
      selector:
        text:
          multiline: true
    cost:
      name: Cost
      description: Optional cost recorded with this completion (your HA currency).
      selector:
        number:
          min: 0
          mode: box
    photo:
      name: Photo
      description: >-
        Optional Home Assistant image-upload id to attach as the completion photo
        (the panel sets this when you upload from the completion dialog).
      selector:
        text:
    who:
      name: Who
      description: Optional person who performed the task (a person entity id).
      selector:
        entity:
          filter:
            domain: person

update_completion:
  name: Update completion
  description: >-
    Amend the metadata (note, cost, photo, who) of an already-recorded completion,
    identified by its timestamp. Does not change the schedule or due date.
  fields:
    task_id:
      name: Task ID
      description: The id of the task whose completion you are editing.
      required: true
      selector:
        text:
    ts:
      name: Completion timestamp
      description: The ISO timestamp (ts) of the completion entry to edit.
      required: true
      selector:
        text:
    note:
      name: Note
      description: New note (omit or leave blank to clear it).
      selector:
        text:
          multiline: true
    cost:
      name: Cost
      description: New cost (omit or leave blank to clear it).
      selector:
        number:
          min: 0
          mode: box
    photo:
      name: Photo
      description: New image-upload id (omit or leave blank to clear it).
      selector:
        text:
    who:
      name: Who
      description: New person entity id (omit or leave blank to clear it).
      selector:
        entity:
          filter:
            domain: person

move_completion:
  name: Move completion
  description: >-
    Re-timestamp an already-recorded completion (back-date or correct it),
    identified by its current timestamp. Unlike update_completion, this changes
    the completion's date/time and re-derives the task's last-completed and
    next-due dates from the result. Fires task_uncompleted then task_completed.
  fields:
    task_id:
      name: Task ID
      description: The id of the task whose completion you are moving.
      required: true
      selector:
        text:
    old_ts:
      name: Current completion timestamp
      description: The ISO timestamp (ts) of the completion entry to move.
      required: true
      selector:
        text:
    new_completed_at:
      name: New completed at
      description: The new date/time to record the completion at.
      required: true
      selector:
        datetime:

delete_completion:
  name: Delete completion
  description: >-
    Remove one completion from a task's history (undo an accidental "done"),
    identified by its timestamp. Re-derives the task's last-completed and next-due
    dates from the remaining history.
  fields:
    task_id:
      name: Task ID
      description: The id of the task whose completion you are removing.
      required: true
      selector:
        text:
    ts:
      name: Completion timestamp
      description: The ISO timestamp (ts) of the completion entry to remove.
      required: true
      selector:
        text:

delete_archived_completion:
  name: Delete archived completion
  description: >-
    Remove one completion from an appliance's archived task history — the history
    kept on the asset after its task was deleted. Identified by the originating task
    id and the completion timestamp.
  fields:
    asset_id:
      name: Asset ID
      description: The id of the appliance whose archived history you are editing.
      required: true
      selector:
        text:
    task_id:
      name: Task ID
      description: The id of the original task the archived completion belongs to.
      required: true
      selector:
        text:
    ts:
      name: Completion timestamp
      description: The ISO timestamp (ts) of the archived completion to remove.
      required: true
      selector:
        text:

trigger_task:
  name: Trigger task
  description: >-
    Arm a condition-driven (triggered) task so it reads as due now — the owner-facing
    counterpart to complete_task (which clears it back to dormant). Call it when the
    condition you monitor becomes true again (e.g. a battery drops low after a prior
    replacement). Idempotent; only valid for triggered tasks.
  fields:
    task_id:
      name: Task ID
      description: The id of the triggered task to arm.
      required: true
      selector:
        text:

snooze_task:
  name: Snooze task
  description: >-
    Defer a task's due date by a number of hours without recording a completion or
    advancing its recurrence — "remind me later". A fresh overdue/due-soon reminder
    fires when the snooze lapses.
  fields:
    task_id:
      name: Task ID
      description: The id of the task to snooze.
      required: true
      selector:
        text:
    hours:
      name: Hours
      description: How many hours to defer the task (defaults to 24).
      selector:
        number:
          min: 1
          max: 8760
          step: 1
          mode: box
          unit_of_measurement: hours
    origin:
      name: Origin
      description: >-
        Optional free-form marker echoed back in the home_keeper_task_snoozed event,
        so a contributing integration can recognise and ignore the snooze it triggered
        (loop prevention). Home Keeper does not interpret it.
      selector:
        text:

skip_task:
  name: Skip task
  description: >-
    Advance a task to its next occurrence without recording a completion — "skip this
    one". A floating task jumps a fresh interval, a fixed task advances one scheduled
    occurrence, and a one-off/triggered/sensor task goes dormant.
  fields:
    task_id:
      name: Task ID
      description: The id of the task to skip.
      required: true
      selector:
        text:
    origin:
      name: Origin
      description: >-
        Optional free-form marker echoed back in the home_keeper_task_skipped event,
        so a contributing integration can recognise and ignore the skip it triggered
        (loop prevention). Home Keeper does not interpret it.
      selector:
        text:

set_task_consumable:
  name: Link task to a consumable
  description: >-
    Link a task to an appliance consumable/part so completing the task consumes one
    spare from the part's stock — and fires a home_keeper_part_low_stock event when
    the count crosses the part's reorder threshold, so you can automate a
    shopping-list add or reorder. Use it to wire any task (for example a sensor task
    armed by a fridge's filter-life entity) to the consumable it depletes. Omit both
    asset_id and part_id to clear the link.
  fields:
    task_id:
      name: Task ID
      description: The id of the task to link (or unlink).
      required: true
      selector:
        text:
    asset_id:
      name: Asset ID
      description: The id of the appliance the consumable belongs to. Omit to unlink.
      selector:
        text:
    part_id:
      name: Part ID
      description: The id of the consumable/part to link. Omit to unlink.
      selector:
        text:

notify:
  name: Notify what's due
  description: >-
    Send an actionable push notification for what's currently due. Name a saved
    notification, or a profile (saved filter), optionally overriding the notify
    target. A "walk" sends the first due task and advances as you action it; a
    "digest" sends one summary. Custom filters and delivery live on saved Profiles and
    Notifications. Returns how many tasks matched and which was sent.
  fields:
    notification:
      name: Notification
      description: Name or id of a saved notification (uses its profile + delivery).
      selector:
        text:
    profile:
      name: Profile
      description: Name or id of a saved profile (filter) to send.
      selector:
        text:
    target:
      name: Target
      description: >-
        Notify service name(s) to send to, overriding the profile's targets
        (e.g. mobile_app_phone).
      selector:
        text:
          multiple: true

list_tasks:
  name: List tasks
  description: Return all tasks as a response.

list_profiles:
  name: List profiles
  description: Return the saved profiles (named task filters) as a response.

add_asset:
  name: Add appliance
  description: >-
    Register an appliance/asset. By default Home Keeper creates a virtual device
    for it so tasks can share one device page; set kind to "existing" to attach
    metadata to a device from another integration instead.
  fields:
    name:
      name: Name
      description: Display name (required for a new virtual device).
      example: Kitchen fridge
      selector:
        text:
    kind:
      name: Kind
      description: virtual (Home Keeper creates the device) or existing (attach to one).
      selector:
        select:
          options:
            - virtual
            - existing
    device_id:
      name: Device
      description: Existing device to attach metadata to (required when kind is existing).
      selector:
        device:
    area_id:
      name: Area
      description: Optional area for the appliance.
      selector:
        area:
    manufacturer:
      name: Manufacturer
      selector:
        text:
    model:
      name: Model
      selector:
        text:
    serial_number:
      name: Serial number
      description: Serial number (shown in the appliance's device-page info block).
      selector:
        text:
    cost:
      name: Cost
      description: Replacement cost (feeds the insurance inventory value rollup).
      selector:
        number:
          min: 0
          mode: box
          step: 0.01
    documents:
      name: Documents
      description: >-
        Manuals / warranties / receipts: a list of entries, each either a link
        (kind: link, with a url) or an uploaded file. Add file documents from the
        panel — this service handles link documents only.
      selector:
        object:
    icon:
      name: Icon
      description: Optional mdi icon for the appliance (e.g. mdi:piano).
      selector:
        icon:
    metadata:
      name: Metadata
      description: >-
        Free-form metadata: a list of entries, each with a label, a type
        (text/link/date) and a value — e.g. serial number, warranty expiry,
        purchase date, provider, links. A date entry with track: true also becomes
        a date sensor on the device (for automations like "warranty expiring soon").
      selector:
        object:
    parts:
      name: Parts
      description: >-
        Structured parts/wear items. Each: name, part_number, type (consumable or
        wear), vendor, cost, an optional http(s) url to the product's page (e.g. an
        Amazon listing), optional stock + reorder_at (spare-inventory tracking),
        optional create_buy_task + restock_quantity (auto-create a "Buy {part}" task
        while the part is low, adding restock_quantity spares back when completed), and
        for wear items replace_interval + replace_unit (days/weeks/months) which
        drive a maintenance task.
      selector:
        object:
    parent_asset_id:
      name: Parent appliance
      description: Make this a subdevice of another (virtual) appliance.
      selector:
        text:
    related_device_ids:
      name: Related devices
      description: Other registry devices to associate with this appliance.
      selector:
        device:
          multiple: true

update_asset:
  name: Update appliance
  description: Update fields of an existing appliance/asset.
  fields:
    asset_id:
      name: Asset ID
      description: The id of the asset to update.
      required: true
      selector:
        text:
    name:
      name: Name
      selector:
        text:
    device_id:
      name: Device
      description: Re-target an existing-device asset.
      selector:
        device:
    area_id:
      name: Area
      selector:
        area:
    manufacturer:
      name: Manufacturer
      selector:
        text:
    model:
      name: Model
      selector:
        text:
    serial_number:
      name: Serial number
      description: Serial number (shown in the appliance's device-page info block).
      selector:
        text:
    cost:
      name: Cost
      selector:
        number:
          min: 0
          mode: box
          step: 0.01
    documents:
      name: Documents
      description: Documents (links/files) on the appliance (see add_asset).
      selector:
        object:
    icon:
      name: Icon
      description: Optional mdi icon for the appliance (e.g. mdi:piano).
      selector:
        icon:
    metadata:
      name: Metadata
      description: Free-form metadata entries (see add_asset).
      selector:
        object:
    parts:
      name: Parts
      description: Structured parts/wear items (see add_asset).
      selector:
        object:
    parent_asset_id:
      name: Parent appliance
      description: Make this a subdevice of another (virtual) appliance.
      selector:
        text:
    related_device_ids:
      name: Related devices
      description: Other registry devices to associate with this appliance.
      selector:
        device:
          multiple: true

delete_asset:
  name: Delete appliance
  description: >-
    Delete an appliance/asset. Its virtual device (if any) is removed and tasks
    attached to it become standalone.
  fields:
    asset_id:
      name: Asset ID
      required: true
      selector:
        text:

list_assets:
  name: List appliances
  description: Return all appliances/assets as a response.

adjust_part_stock:
  name: Adjust part stock
  description: >-
    Change a part's on-hand spare count by a signed delta (clamped at zero). Use a
    negative delta to consume a spare, a positive delta to restock. When a decrease
    reaches or crosses the part's reorder threshold, a home_keeper_part_low_stock
    event fires so you can automate a shopping-list add or reorder.
  fields:
    asset_id:
      name: Asset ID
      description: The id of the appliance the part belongs to.
      required: true
      selector:
        text:
    part_id:
      name: Part ID
      description: The id of the part whose stock to adjust.
      required: true
      selector:
        text:
    delta:
      name: Delta
      description: Signed change to apply to the spare count (e.g. -1 to consume, 2 to restock).
      required: true
      example: -1
      selector:
        number:
          mode: box

remove_part_file:
  name: Remove part file
  description: >-
    Detach a part's attached file (receipt / spec sheet / photo), deleting its
    on-disk blob. Upload/replace a file from the panel; this service handles
    removal only (a service call can't carry binary bytes).
  fields:
    asset_id:
      name: Asset ID
      description: The id of the appliance the part belongs to.
      required: true
      selector:
        text:
    part_id:
      name: Part ID
      description: The id of the part whose file to remove.
      required: true
      selector:
        text:

add_asset_document:
  name: Add appliance document
  description: >-
    Attach a link document (manual / warranty / receipt) to an appliance. Upload
    file documents from the panel; this service handles links only.
  fields:
    asset_id:
      name: Asset ID
      description: The id of the appliance to attach the document to.
      required: true
      selector:
        text:
    document:
      name: Document
      description: >-
        The document to add: an object with name and url (kind defaults to link).
      required: true
      example: '{"name": "Manual", "url": "https://example.com/manual.pdf"}'
      selector:
        object:

remove_asset_document:
  name: Remove appliance document
  description: >-
    Detach a document from an appliance. If it was an uploaded file, its stored
    copy is deleted from disk too.
  fields:
    asset_id:
      name: Asset ID
      description: The id of the appliance the document belongs to.
      required: true
      selector:
        text:
    document_id:
      name: Document ID
      description: The id of the document to remove.
      required: true
      selector:
        text:

update_asset_document:
  name: Update appliance document
  description: >-
    Edit an existing document on an appliance — rename it, or (for link
    documents) change its URL. Uploaded file documents can only be renamed.
  fields:
    asset_id:
      name: Asset ID
      description: The id of the appliance the document belongs to.
      required: true
      selector:
        text:
    document_id:
      name: Document ID
      description: The id of the document to edit.
      required: true
      selector:
        text:
    changes:
      name: Changes
      description: >-
        The fields to change: an object with an optional name and (for link
        documents) an optional url.
      required: true
      example: '{"name": "Owner''s manual", "url": "https://example.com/manual.pdf"}'
      selector:
        object:

export_inventory:
  name: Export inventory
  description: >-
    Return a home inventory for insurance as a response — one row per appliance
    (make/model/serial, purchase + warranty dates, replacement cost, on-hand spares
    value) with rolled-up totals, plus a ready-to-save CSV under the "csv" key.

set_options:
  name: Set options
  description: >-
    Update Home Keeper's integration options (the same settings as the panel's
    Settings tab and the options flow). Only the fields you pass change. Controls
    whether device_class "problem" binary sensors are synced as tasks (with
    entity / device / area / label exclusions) and how long completed one-off tasks
    are kept.
  fields:
    sync_problem_sensors:
      name: Sync problem sensors as tasks
      description: Mirror every device_class "problem" binary sensor as a task.
      selector:
        boolean:
    one_off_retention_days:
      name: One-off retention (days)
      description: >-
        Auto-delete a completed one-off task this many days after it is completed.
        0 (the default) keeps completed one-offs forever.
      selector:
        number:
          min: 0
          max: 3650
          step: 1
          mode: box
    problem_sensor_exclude_entities:
      name: Excluded sensors
      description: Problem binary sensors to leave out of syncing.
      selector:
        entity:
          multiple: true
          filter:
            domain: binary_sensor
            device_class: problem
    problem_sensor_exclude_devices:
      name: Excluded devices
      description: Devices whose problem sensors should not be synced.
      selector:
        device:
          multiple: true
    problem_sensor_exclude_areas:
      name: Excluded areas
      description: Areas whose problem sensors should not be synced.
      selector:
        area:
          multiple: true
    problem_sensor_exclude_labels:
      name: Excluded labels
      description: Labels whose problem sensors should not be synced.
      selector:
        label:
          multiple: true
    dismissed_companions:
      name: Dismissed companions
      description: >-
        Glue integration domains to hide from the Settings → Companions
        "Suggested" list. Dismissing only silences a suggestion; a connected
        pairing is always shown.
      selector:
        text:
          multiple: true

register_companion:
  name: Register companion
  description: >-
    Announce another integration that works with Home Keeper so it appears in the
    panel's Settings → Companions section. Intended to be called by a
    Home-Keeper-aware integration at its own setup (and in response to the
    home_keeper_register_companions event). Home Keeper stores the descriptor
    verbatim and never imports the companion.
  fields:
    domain:
      name: Domain
      description: The companion integration's domain.
      required: true
      example: pawsistant
      selector:
        text:
    name:
      name: Name
      description: Display name shown in the Companions list.
      required: true
      example: Pawsistant
      selector:
        text:
    icon:
      name: Icon
      description: An mdi icon for the row.
      example: mdi:paw
      selector:
        icon:
    description:
      name: Description
      description: One line describing what the companion does with Home Keeper.
      selector:
        text:
    config_entry_id:
      name: Config entry id
      description: >-
        The companion's config entry id, so the panel's "Configure" button can
        deep-link to its options page.
      selector:
        text:
    docs_url:
      name: Docs URL
      description: A link to the companion's documentation.
      selector:
        text:
    capabilities:
      name: Capabilities
      description: Free-form capability tags (e.g. care_schedules, battery_replacement).
      selector:
        text:
          multiple: true

list_companions:
  name: List companions
  description: >-
    Return the merged companion list (self-registered integrations plus detected
    upstreams whose glue isn't installed yet) as a response.
