add_task:
  name: Add task
  description: Create a new maintenance task or chore.
  fields:
    name:
      name: Name
      description: Display name of the task.
      required: true
      example: Replace furnace filter
      selector:
        text:
    notes:
      name: Notes
      description: Optional free-text notes.
      selector:
        text:
          multiline: true
    recurrence_type:
      name: Recurrence type
      description: floating (measured from completion) or fixed (anchored schedule).
      selector:
        select:
          options:
            - floating
            - fixed
    interval:
      name: Interval
      description: Repeat every N units/steps.
      example: 1
      selector:
        number:
          min: 1
          mode: box
    unit:
      name: Unit
      description: For floating tasks - days, weeks, or months.
      selector:
        select:
          options:
            - days
            - weeks
            - months
    freq:
      name: Frequency
      description: For fixed tasks - DAILY, WEEKLY, or MONTHLY.
      selector:
        select:
          options:
            - DAILY
            - WEEKLY
            - MONTHLY
    anchor:
      name: Anchor
      description: For fixed tasks - ISO datetime of the first occurrence (sets time-of-day).
      example: "2026-01-01T08:00:00"
      selector:
        text:
    device_id:
      name: Device
      description: Optional device to attach this task to.
      selector:
        device:
    area_id:
      name: Area
      description: Optional area to associate with this task.
      selector:
        area:

update_task:
  name: Update task
  description: Update fields of an existing task.
  fields:
    task_id:
      name: Task ID
      description: The id of the task to update.
      required: true
      selector:
        text:
    name:
      name: Name
      description: New display name.
      selector:
        text:
    notes:
      name: Notes
      description: New notes.
      selector:
        text:
          multiline: true
    recurrence_type:
      name: Recurrence type
      description: floating or fixed.
      selector:
        select:
          options:
            - floating
            - fixed
    interval:
      name: Interval
      description: Repeat every N units/steps.
      selector:
        number:
          min: 1
          mode: box
    unit:
      name: Unit
      description: days, weeks, or months (floating).
      selector:
        select:
          options:
            - days
            - weeks
            - months
    freq:
      name: Frequency
      description: DAILY, WEEKLY, or MONTHLY (fixed).
      selector:
        select:
          options:
            - DAILY
            - WEEKLY
            - MONTHLY
    anchor:
      name: Anchor
      description: ISO datetime of the first occurrence (fixed).
      selector:
        text:
    device_id:
      name: Device
      description: Device to attach this task to.
      selector:
        device:
    area_id:
      name: Area
      description: Area to associate with this task.
      selector:
        area:

delete_task:
  name: Delete task
  description: Delete a task.
  fields:
    task_id:
      name: Task ID
      required: true
      selector:
        text:

complete_task:
  name: Complete task
  description: Mark a task complete and advance its recurrence.
  fields:
    task_id:
      name: Task ID
      required: true
      selector:
        text:
    completed_at:
      name: Completed at
      description: Optional completion timestamp (defaults to now).
      selector:
        datetime:

list_tasks:
  name: List tasks
  description: Return all tasks as a response.

add_asset:
  name: Add appliance
  description: >-
    Register an appliance/asset. By default Home Keeper creates a virtual device
    for it so tasks can share one device page; set kind to "existing" to attach
    metadata to a device from another integration instead.
  fields:
    name:
      name: Name
      description: Display name (required for a new virtual device).
      example: Kitchen fridge
      selector:
        text:
    kind:
      name: Kind
      description: virtual (Home Keeper creates the device) or existing (attach to one).
      selector:
        select:
          options:
            - virtual
            - existing
    device_id:
      name: Device
      description: Existing device to attach metadata to (required when kind is existing).
      selector:
        device:
    area_id:
      name: Area
      description: Optional area for the appliance.
      selector:
        area:
    manufacturer:
      name: Manufacturer
      selector:
        text:
    model:
      name: Model
      selector:
        text:
    serial_number:
      name: Serial number
      selector:
        text:
    manufacture_date:
      name: Manufacture date
      description: ISO date (YYYY-MM-DD).
      selector:
        date:
    purchase_date:
      name: Purchase date
      description: ISO date (YYYY-MM-DD).
      selector:
        date:
    install_date:
      name: Install date
      description: ISO date (YYYY-MM-DD).
      selector:
        date:
    warranty_expiry:
      name: Warranty expiry
      description: ISO date (YYYY-MM-DD). Surfaced as a date sensor on the device.
      selector:
        date:
    warranty_provider:
      name: Warranty provider
      selector:
        text:
    vendor:
      name: Vendor
      description: Where to rebuy / service provider.
      selector:
        text:
    cost:
      name: Cost
      selector:
        number:
          min: 0
          mode: box
          step: 0.01
    manual_url:
      name: Manual URL
      selector:
        text:
    icon:
      name: Icon
      description: Optional mdi icon for the appliance (e.g. mdi:piano).
      selector:
        icon:
    parts:
      name: Parts
      description: >-
        Structured parts/wear items. Each: name, part_number, type (consumable or
        wear), vendor, cost, and for wear items replace_interval + replace_unit
        (days/weeks/months) which drive a maintenance task.
      selector:
        object:
    parent_asset_id:
      name: Parent appliance
      description: Make this a subdevice of another (virtual) appliance.
      selector:
        text:
    related_device_ids:
      name: Related devices
      description: Other registry devices to associate with this appliance.
      selector:
        device:
          multiple: true
    notes:
      name: Notes
      selector:
        text:
          multiline: true

update_asset:
  name: Update appliance
  description: Update fields of an existing appliance/asset.
  fields:
    asset_id:
      name: Asset ID
      description: The id of the asset to update.
      required: true
      selector:
        text:
    name:
      name: Name
      selector:
        text:
    device_id:
      name: Device
      description: Re-target an existing-device asset.
      selector:
        device:
    area_id:
      name: Area
      selector:
        area:
    manufacturer:
      name: Manufacturer
      selector:
        text:
    model:
      name: Model
      selector:
        text:
    serial_number:
      name: Serial number
      selector:
        text:
    manufacture_date:
      name: Manufacture date
      selector:
        date:
    purchase_date:
      name: Purchase date
      selector:
        date:
    install_date:
      name: Install date
      selector:
        date:
    warranty_expiry:
      name: Warranty expiry
      selector:
        date:
    warranty_provider:
      name: Warranty provider
      selector:
        text:
    vendor:
      name: Vendor
      selector:
        text:
    cost:
      name: Cost
      selector:
        number:
          min: 0
          mode: box
          step: 0.01
    manual_url:
      name: Manual URL
      selector:
        text:
    icon:
      name: Icon
      description: Optional mdi icon for the appliance (e.g. mdi:piano).
      selector:
        icon:
    parts:
      name: Parts
      description: Structured parts/wear items (see add_asset).
      selector:
        object:
    parent_asset_id:
      name: Parent appliance
      description: Make this a subdevice of another (virtual) appliance.
      selector:
        text:
    related_device_ids:
      name: Related devices
      description: Other registry devices to associate with this appliance.
      selector:
        device:
          multiple: true
    notes:
      name: Notes
      selector:
        text:
          multiline: true

delete_asset:
  name: Delete appliance
  description: >-
    Delete an appliance/asset. Its virtual device (if any) is removed and tasks
    attached to it become standalone.
  fields:
    asset_id:
      name: Asset ID
      required: true
      selector:
        text:

list_assets:
  name: List appliances
  description: Return all appliances/assets as a response.
